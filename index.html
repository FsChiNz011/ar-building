<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Architecture Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: #e8e4dc;
    }

    /* ─── Header ─── */
    header {
      padding: 52px 24px 16px;
      background: linear-gradient(to bottom, #0a0a0f 60%, transparent);
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 10; pointer-events: none;
    }
    header h1 {
      font-size: 15px; font-weight: 400;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: #e8e4dc;
    }
    header p {
      font-size: 10px; letter-spacing: 0.15em;
      color: #4a4640; text-transform: uppercase; margin-top: 4px;
    }

    /* ─── model-viewer ─── */
    model-viewer {
      width: 100%;
      height: 100dvh;
      background-color: #0a0a0f;
      --progress-bar-color: #c8a96e;
      --progress-bar-height: 2px;
    }

    /* ─── AR Button (custom slot) ─── */
    .ar-button-wrap {
      position: absolute;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      width: 85%; max-width: 300px;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }

    #ar-btn {
      width: 100%;
      padding: 16px;
      border-radius: 3px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.3em; text-transform: uppercase;
      border: 1.5px solid #c8a96e;
      background: rgba(10,10,15,0.85);
      color: #c8a96e;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #ar-btn:active {
      background: #c8a96e;
      color: #0a0a0f;
    }

    .hint {
      font-size: 10px; letter-spacing: 0.12em;
      color: #3a3835; text-align: center;
      text-transform: uppercase;
    }

    /* ─── Poster / Loading overlay ─── */
    #poster {
      position: absolute; inset: 0;
      background: #0a0a0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 5;
      transition: opacity 0.6s ease;
    }
    #poster.hidden { opacity: 0; pointer-events: none; }

    .logo-ring {
      width: 64px; height: 64px;
      border: 1.5px solid #c8a96e44;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-ring svg { width: 28px; height: 28px; color: #c8a96e; }

    .load-label {
      font-size: 10px; letter-spacing: 0.3em;
      color: #3a3835; text-transform: uppercase;
    }
    .progress-wrap {
      width: 140px; height: 1px;
      background: #1a1a22; position: relative; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #c8a96e;
      width: 0%; transition: width 0.3s ease;
    }

    /* ─── Not supported ─── */
    #not-ar {
      display: none;
      font-size: 11px; letter-spacing: 0.12em;
      color: #3a3835; text-align: center;
      padding: 0 32px; line-height: 1.8;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Loading Poster -->
  <div id="poster">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div class="load-label" id="load-label">กำลังโหลดโมเดล...</div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Header -->
  <header>
    <h1>Architecture AR</h1>
    <p>Interactive 3D · AR Ready</p>
  </header>

  <!-- Model Viewer -->
  <model-viewer
    id="viewer"
    src="./TEST5m.glb"
    alt="Architecture 3D Model"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    touch-action="pan-y"
    auto-rotate
    auto-rotate-delay="3000"
    rotation-per-second="8deg"
    shadow-intensity="1.2"
    shadow-softness="0.8"
    environment-image="neutral"
    exposure="0.9"
    tone-mapping="commerce"
  >
    <!-- Custom AR button in slot -->
    <div class="ar-button-wrap" slot="ar-button">
      <button id="ar-btn">เปิด AR บนพื้นจริง</button>
      <div class="hint">Android: WebXR · iOS: Quick Look</div>
    </div>

    <!-- Fallback when AR not supported -->
    <div id="not-ar" slot="ar-failure">
      <p>อุปกรณ์นี้ยังไม่รองรับ AR<br/>แต่ยังดูโมเดล 3D แบบหมุนได้ปกติ</p>
    </div>
  </model-viewer>

  <script>
    const viewer       = document.getElementById('viewer');
    const poster       = document.getElementById('poster');
    const progressFill = document.getElementById('progress-fill');
    const loadLabel    = document.getElementById('load-label');

    // ─── Loading Progress ────────────────────────────────────
    viewer.addEventListener('progress', e => {
      const pct = Math.round(e.detail.totalProgress * 100);
      progressFill.style.width = pct + '%';
      if (pct < 100) {
        loadLabel.textContent = `กำลังโหลด ${pct}%`;
      }
    });

    viewer.addEventListener('load', () => {
      progressFill.style.width = '100%';
      loadLabel.textContent = 'พร้อมแล้ว';
      setTimeout(() => poster.classList.add('hidden'), 500);
    });

    // ─── AR Events ───────────────────────────────────────────
    viewer.addEventListener('ar-status', e => {
      if (e.detail.status === 'session-started') {
        // AR session เริ่มแล้ว — user เห็น AR แล้ว
      }
      if (e.detail.status === 'not-presenting') {
        // กลับจาก AR
      }
    });
  </script>
</body>
</html>
